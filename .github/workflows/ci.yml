name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: 22.19.0

jobs:
  stock-sidecar:
    name: Stock Sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install dependencies
        working-directory: crates/stock-sidecar
        run: pnpm install --frozen-lockfile

      - name: Typecheck, test, and build sidecar
        working-directory: crates/stock-sidecar
        run: |
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm verify:bundle

  gateway:
    name: Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: crates/agent-gateway/go.mod
          cache-dependency-path: crates/agent-gateway/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install protobuf toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fsSL -o "$RUNNER_TEMP/protoc.zip" \
            https://github.com/protocolbuffers/protobuf/releases/download/v34.0/protoc-34.0-linux-x86_64.zip
          unzip -q "$RUNNER_TEMP/protoc.zip" -d "$RUNNER_TEMP/protoc"
          echo "$RUNNER_TEMP/protoc/bin" >> "$GITHUB_PATH"
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build embedded Gateway WebUI
        working-directory: crates/agent-gateway/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Check generated protobuf
        run: |
          make proto
          git diff --exit-code -- crates/agent-gateway/internal/proto/v1

      - name: Test gateway
        working-directory: crates/agent-gateway
        run: go test ./...

  gateway-docker:
    name: Gateway Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: calen-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          set -euo pipefail
          docker rm -f calen-gateway-smoke >/dev/null 2>&1 || true
          docker run -d \
            --name calen-gateway-smoke \
            -p 18080:8080 \
            -e LIVEAGENT_GATEWAY_TOKEN=ci-token \
            calen-gateway:ci
          trap 'docker rm -f calen-gateway-smoke >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz | grep -q '"ok":true'; then
              exit 0
            fi
            sleep 1
          done
          echo "Gateway Docker smoke test failed; container logs:"
          docker logs calen-gateway-smoke || true
          exit 1

  webui:
    name: Gateway WebUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install dependencies
        working-directory: crates/agent-gateway/web
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        working-directory: crates/agent-gateway/web
        run: pnpm build

      - name: Lint WebUI
        working-directory: crates/agent-gateway/web
        run: pnpm lint

      - name: Test WebUI modules
        working-directory: crates/agent-gateway/web
        run: pnpm test

  gui:
    name: GUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build GUI frontend
        working-directory: crates/agent-gui
        run: pnpm build

      - name: Lint GUI frontend
        working-directory: crates/agent-gui
        run: pnpm lint

      - name: Test frontend modules
        working-directory: crates/agent-gui
        run: pnpm test:frontend

      - name: Test release scripts
        working-directory: crates/agent-gui
        run: pnpm test:release

  tauri-rust:
    name: Tauri Rust Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Check Tauri backend tests
        env:
          CARGO_TERM_COLOR: always
        run: cargo check --manifest-path crates/agent-gui/src-tauri/Cargo.toml --tests

      - name: Test Tauri history migrations
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --manifest-path crates/agent-gui/src-tauri/Cargo.toml chat_history --lib

      - name: Test stock sidecar restart lifecycle
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --manifest-path crates/agent-gui/src-tauri/Cargo.toml stock::tests --lib

      - name: Test stock portfolio ledger, CSV, and encrypted backup
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --manifest-path crates/agent-gui/src-tauri/Cargo.toml stock_portfolio::tests --lib

  tauri-windows-check:
    name: Tauri Windows Installer Smoke
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Verify Windows Installer argument quoting
        shell: pwsh
        run: ./scripts/release/test-msiexec-argument-quoting.ps1

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Verify packaged stock sidecar on Windows
        shell: pwsh
        run: |
          pnpm --dir crates/stock-sidecar install --frozen-lockfile
          pnpm --dir crates/stock-sidecar typecheck
          pnpm --dir crates/stock-sidecar test
          pnpm --dir crates/stock-sidecar build
          pnpm --dir crates/stock-sidecar verify:bundle

      - name: Install GUI dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Stage stock sidecar installer resources
        shell: pwsh
        run: |
          $resourceDir = "crates/agent-gui/src-tauri/resources/stock-sidecar"
          New-Item -ItemType Directory -Force "$resourceDir/dist" | Out-Null
          Copy-Item (Get-Command node).Source "$resourceDir/node.exe" -Force
          Copy-Item "crates/stock-sidecar/dist/*" "$resourceDir/dist" -Recurse -Force
          Copy-Item "crates/stock-sidecar/package.json" "$resourceDir/package.json" -Force
          $required = @(
            "$resourceDir/node.exe",
            "$resourceDir/dist/stdio.mjs",
            "$resourceDir/dist/NOTICE.md",
            "$resourceDir/dist/licenses/opptrix-Apache-2.0.txt"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Missing staged installer resource: $path"
            }
          }
          if (Test-Path -LiteralPath "$resourceDir/node_modules") {
            throw "Installer sidecar resource must not contain node_modules."
          }

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        shell: pwsh
        run: |
          choco install protoc -y --no-progress
          "$env:ChocolateyInstall\lib\protoc\tools\bin" | Out-File -Append $env:GITHUB_PATH

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Check Tauri backend on Windows
        env:
          CARGO_TERM_COLOR: always
        run: cargo check --manifest-path crates/agent-gui/src-tauri/Cargo.toml --tests

      - name: Test stock lifecycle on Windows
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --manifest-path crates/stock-process-tree/Cargo.toml

      - name: Test stock portfolio ledger on Windows
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --manifest-path crates/stock-portfolio-core-tests/Cargo.toml

      - name: Generate ephemeral updater signing key
        shell: pwsh
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "calen-ci-updater.key"
          pnpm --dir crates/agent-gui exec tauri signer generate --ci --write-keys "$keyPath" --password "calen-ci-only"
          "TAURI_SIGNING_PRIVATE_KEY=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=calen-ci-only" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $delimiter = "CALEN_UPDATER_KEY_$([Guid]::NewGuid().ToString('N'))"
          "CALEN_UPDATER_PUBLIC_KEY<<$delimiter" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Get-Content -LiteralPath "$keyPath.pub" -Raw | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $delimiter | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build previous Windows installers for upgrade smoke
        shell: pwsh
        env:
          CALEN_UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/release/prepare-app-version-from-tag.mjs v0.0.1 --tauri-config crates/agent-gui/src-tauri/tauri.ci.generated.conf.json
          pnpm --dir crates/agent-gui tauri build `
            --config src-tauri/tauri.windows.release.conf.json `
            --config src-tauri/tauri.ci.generated.conf.json `
            --target x86_64-pc-windows-msvc `
            --bundles nsis msi `
            --ci

          $bundleRoot = "target/x86_64-pc-windows-msvc/release/bundle"
          $previousSetup = Get-ChildItem `
            -LiteralPath "$bundleRoot/nsis" `
            -Filter "*.exe" -File | Select-Object -First 1
          $previousMsi = Get-ChildItem `
            -LiteralPath "$bundleRoot/msi" `
            -Filter "*.msi" -File | Select-Object -First 1
          if ($null -eq $previousSetup -or $null -eq $previousMsi) {
            throw "Previous Windows installer smoke build did not produce both NSIS and MSI artifacts."
          }
          $savedPreviousSetup = Join-Path $env:RUNNER_TEMP "Calen-0.0.1-Windows-x64-Setup.exe"
          $savedPreviousMsi = Join-Path $env:RUNNER_TEMP "Calen-0.0.1-Windows-x64.msi"
          Copy-Item -LiteralPath $previousSetup.FullName -Destination $savedPreviousSetup -Force
          Copy-Item -LiteralPath $previousMsi.FullName -Destination $savedPreviousMsi -Force
          "CALEN_CI_PREVIOUS_SETUP=$savedPreviousSetup" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CALEN_CI_PREVIOUS_MSI=$savedPreviousMsi" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build current Windows installer smoke artifacts
        shell: pwsh
        env:
          CALEN_UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          $bundleRoot = "target/x86_64-pc-windows-msvc/release/bundle"
          if (Test-Path -LiteralPath $bundleRoot) {
            Remove-Item -LiteralPath $bundleRoot -Recurse -Force
          }
          node scripts/release/prepare-app-version-from-tag.mjs v0.0.2 --tauri-config crates/agent-gui/src-tauri/tauri.ci.generated.conf.json
          pnpm --dir crates/agent-gui tauri build `
            --config src-tauri/tauri.windows.release.conf.json `
            --config src-tauri/tauri.ci.generated.conf.json `
            --target x86_64-pc-windows-msvc `
            --bundles nsis msi `
            --ci

      - name: Validate temporary Windows installers in Chinese paths
        shell: pwsh
        run: |
          $bundleRoot = "target/x86_64-pc-windows-msvc/release/bundle"
          $setup = Get-ChildItem -LiteralPath "$bundleRoot/nsis" -Filter "*.exe" -File | Select-Object -First 1
          $msi = Get-ChildItem -LiteralPath "$bundleRoot/msi" -Filter "*.msi" -File | Select-Object -First 1
          if ($null -eq $setup -or $null -eq $msi) {
            throw "Windows installer smoke build did not produce both NSIS and MSI artifacts."
          }
          foreach ($signature in @("$($setup.FullName).sig", "$($msi.FullName).sig")) {
            if (-not (Test-Path -LiteralPath $signature -PathType Leaf)) {
              throw "Updater signature was not generated: $signature"
            }
          }
          cargo run --release --locked `
            --manifest-path crates/agent-gui/src-tauri/Cargo.toml `
            --target x86_64-pc-windows-msvc `
            --example verify-updater-signature `
            -- "$($setup.FullName)" "$($msi.FullName)"
          if ($LASTEXITCODE -ne 0) {
            throw "Updater signature verification failed with exit code $LASTEXITCODE."
          }
          Write-Host "Calen installer smoke artifacts must not be uploaded; validating in place."
          & scripts/release/test-windows-installers.ps1 `
            -SetupPath $setup.FullName `
            -MsiPath $msi.FullName `
            -PreviousSetupPath $env:CALEN_CI_PREVIOUS_SETUP `
            -PreviousMsiPath $env:CALEN_CI_PREVIOUS_MSI `
            -PreviousVersion "0.0.1" `
            -CurrentVersion "0.0.2"

  mirror:
    name: GUI/WebUI Mirror Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check mirrored files are byte-identical
        run: node scripts/check-mirror.mjs

  whitespace:
    name: Diff Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: git diff --check
