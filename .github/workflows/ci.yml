name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: 22.19.0

jobs:
  stock-sidecar:
    name: Stock Sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install dependencies
        working-directory: crates/stock-sidecar
        run: pnpm install --frozen-lockfile

      - name: Typecheck, test, and build sidecar
        working-directory: crates/stock-sidecar
        run: |
          pnpm typecheck
          pnpm test
          pnpm build

  gateway:
    name: Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: crates/agent-gateway/go.mod
          cache-dependency-path: crates/agent-gateway/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install protobuf toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fsSL -o "$RUNNER_TEMP/protoc.zip" \
            https://github.com/protocolbuffers/protobuf/releases/download/v34.0/protoc-34.0-linux-x86_64.zip
          unzip -q "$RUNNER_TEMP/protoc.zip" -d "$RUNNER_TEMP/protoc"
          echo "$RUNNER_TEMP/protoc/bin" >> "$GITHUB_PATH"
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build embedded Gateway WebUI
        working-directory: crates/agent-gateway/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Check generated protobuf
        run: |
          make proto
          git diff --exit-code -- crates/agent-gateway/internal/proto/v1

      - name: Test gateway
        working-directory: crates/agent-gateway
        run: go test ./...

  gateway-docker:
    name: Gateway Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: calen-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          set -euo pipefail
          docker rm -f calen-gateway-smoke >/dev/null 2>&1 || true
          docker run -d \
            --name calen-gateway-smoke \
            -p 18080:8080 \
            -e LIVEAGENT_GATEWAY_TOKEN=ci-token \
            calen-gateway:ci
          trap 'docker rm -f calen-gateway-smoke >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz | grep -q '"ok":true'; then
              exit 0
            fi
            sleep 1
          done
          echo "Gateway Docker smoke test failed; container logs:"
          docker logs calen-gateway-smoke || true
          exit 1

  webui:
    name: Gateway WebUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install dependencies
        working-directory: crates/agent-gateway/web
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        working-directory: crates/agent-gateway/web
        run: pnpm build

      - name: Lint WebUI
        working-directory: crates/agent-gateway/web
        run: pnpm lint

      - name: Test WebUI modules
        working-directory: crates/agent-gateway/web
        run: pnpm test

  gui:
    name: GUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build GUI frontend
        working-directory: crates/agent-gui
        run: pnpm build

      - name: Lint GUI frontend
        working-directory: crates/agent-gui
        run: pnpm lint

      - name: Test frontend modules
        working-directory: crates/agent-gui
        run: pnpm test:frontend

      - name: Test release scripts
        working-directory: crates/agent-gui
        run: pnpm test:release

  tauri-rust:
    name: Tauri Rust Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Check Tauri backend tests
        env:
          CARGO_TERM_COLOR: always
        run: cargo check --manifest-path crates/agent-gui/src-tauri/Cargo.toml --tests

      - name: Test Tauri history migrations
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --manifest-path crates/agent-gui/src-tauri/Cargo.toml chat_history --lib

  tauri-windows-check:
    name: Tauri Windows Check
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install protobuf compiler
        shell: pwsh
        run: |
          choco install protoc -y --no-progress
          "$env:ChocolateyInstall\lib\protoc\tools\bin" | Out-File -Append $env:GITHUB_PATH

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Check Tauri backend on Windows
        env:
          CARGO_TERM_COLOR: always
        run: cargo check --manifest-path crates/agent-gui/src-tauri/Cargo.toml --tests --target x86_64-pc-windows-msvc

  mirror:
    name: GUI/WebUI Mirror Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check mirrored files are byte-identical
        run: node scripts/check-mirror.mjs

  whitespace:
    name: Diff Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: git diff --check
