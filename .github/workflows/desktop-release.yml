name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.1.0
        required: true

permissions:
  contents: read

env:
  NODE_VERSION: 24

jobs:
  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Resolve release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: node scripts/release/prepare-app-version-from-tag.mjs "$RELEASE_TAG" --github-output "$GITHUB_OUTPUT" --json

      - name: Validate stock provider terms approval
        env:
          CALEN_STOCK_PROVIDER_TERMS_APPROVED: ${{ vars.CALEN_STOCK_PROVIDER_TERMS_APPROVED }}
        run: |
          if [ "$CALEN_STOCK_PROVIDER_TERMS_APPROVED" != "true" ]; then
            echo "Set repository variable CALEN_STOCK_PROVIDER_TERMS_APPROVED=true only after written provider terms approval."
            exit 1
          fi

  windows:
    name: Windows x64
    runs-on: windows-latest
    needs: release-metadata
    env:
      LIVEAGENT_APP_VERSION: ${{ needs.release-metadata.outputs.app_version }}
      LIVEAGENT_IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
      LIVEAGENT_RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-metadata.outputs.release_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare release version config
        shell: bash
        working-directory: crates/agent-gui
        run: node ../../scripts/release/prepare-app-version-from-tag.mjs "$LIVEAGENT_RELEASE_TAG" --github-env "$GITHUB_ENV" --tauri-config src-tauri/tauri.version.generated.conf.json

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install protobuf compiler
        run: |
          choco install protoc -y --no-progress
          "$env:ChocolateyInstall\lib\protoc\tools\bin" | Out-File -Append $env:GITHUB_PATH

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Test stock portfolio ledger without desktop runtime DLLs
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --manifest-path crates/stock-portfolio-core-tests/Cargo.toml

      - name: Install frontend dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Build and stage stock sidecar runtime
        shell: pwsh
        run: |
          pnpm --dir crates/stock-sidecar install --frozen-lockfile
          pnpm --dir crates/stock-sidecar build
          pnpm --dir crates/stock-sidecar verify:bundle
          $resourceDir = "crates/agent-gui/src-tauri/resources/stock-sidecar"
          New-Item -ItemType Directory -Force "$resourceDir/dist" | Out-Null
          Copy-Item (Get-Command node).Source "$resourceDir/node.exe"
          Copy-Item "crates/stock-sidecar/dist/*" "$resourceDir/dist" -Recurse -Force
          Copy-Item "crates/stock-sidecar/package.json" "$resourceDir/package.json" -Force
          $requiredSidecarFiles = @(
            "$resourceDir/node.exe",
            "$resourceDir/dist/stdio.mjs",
            "$resourceDir/dist/NOTICE.md",
            "$resourceDir/dist/licenses/unpdf-MIT.txt",
            "$resourceDir/dist/licenses/pdfjs-Apache-2.0.txt",
            "$resourceDir/dist/licenses/opptrix-Apache-2.0.txt"
          )
          foreach ($requiredFile in $requiredSidecarFiles) {
            if (-not (Test-Path -LiteralPath $requiredFile -PathType Leaf)) {
              throw "Required stock sidecar resource was not generated: $requiredFile"
            }
          }
          if (Test-Path -LiteralPath "$resourceDir/node_modules") {
            throw "Stock sidecar resource must not contain node_modules."
          }

      - name: Validate updater signing configuration
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          CALEN_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: node scripts/release/validate-updater-signing-env.mjs

      - name: Build Windows installers
        working-directory: crates/agent-gui
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CALEN_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          CALEN_UPDATE_REPOSITORY: ${{ github.repository }}
        run: pnpm tauri build --config src-tauri/tauri.windows.release.conf.json --config "$LIVEAGENT_TAURI_VERSION_CONFIG" --target x86_64-pc-windows-msvc

      - name: Stage Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          msi_path="$(find target crates/agent-gui/src-tauri/target -type f -name '*.msi' -path '*bundle*' -print -quit 2>/dev/null || true)"
          exe_path="$(find target crates/agent-gui/src-tauri/target -type f -name '*.exe' -path '*bundle*' -print -quit 2>/dev/null || true)"
          test -n "$msi_path"
          test -n "$exe_path"
          test -f "$msi_path.sig"
          test -f "$exe_path.sig"
          cp "$msi_path" "dist/Calen-${LIVEAGENT_RELEASE_TAG}-Windows-x64.msi"
          cp "$msi_path.sig" "dist/Calen-${LIVEAGENT_RELEASE_TAG}-Windows-x64.msi.sig"
          cp "$exe_path" "dist/Calen-${LIVEAGENT_RELEASE_TAG}-Windows-x64-Setup.exe"
          cp "$exe_path.sig" "dist/Calen-${LIVEAGENT_RELEASE_TAG}-Windows-x64-Setup.exe.sig"
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 4

      - name: Verify Windows Installer argument quoting
        shell: pwsh
        run: ./scripts/release/test-msiexec-argument-quoting.ps1

      - name: Verify Windows updater signatures against configured public key
        shell: pwsh
        env:
          CALEN_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          cargo run --release --locked `
            --manifest-path crates/agent-gui/src-tauri/Cargo.toml `
            --example verify-updater-signature `
            -- "dist/Calen-$env:LIVEAGENT_RELEASE_TAG-Windows-x64-Setup.exe" `
               "dist/Calen-$env:LIVEAGENT_RELEASE_TAG-Windows-x64.msi"
          if ($LASTEXITCODE -ne 0) {
            throw "Updater signature verification failed with exit code $LASTEXITCODE."
          }

      - name: Validate Windows install, upgrade, sidecar, and uninstall lifecycle
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          & scripts/release/test-windows-installers.ps1 `
            -SetupPath "dist/Calen-$env:LIVEAGENT_RELEASE_TAG-Windows-x64-Setup.exe" `
            -MsiPath "dist/Calen-$env:LIVEAGENT_RELEASE_TAG-Windows-x64.msi" `
            -Repository "${{ github.repository }}" `
            -CurrentTag "$env:LIVEAGENT_RELEASE_TAG" `
            -CurrentVersion "$env:LIVEAGENT_APP_VERSION" `
            -GitHubToken "$env:GH_TOKEN"

      - uses: actions/upload-artifact@v7
        with:
          name: calen-windows-x64
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - release-metadata
      - windows
    if: ${{ needs.release-metadata.result == 'success' && needs.windows.result == 'success' }}
    env:
      LIVEAGENT_APP_VERSION: ${{ needs.release-metadata.outputs.app_version }}
      LIVEAGENT_IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
      LIVEAGENT_RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-metadata.outputs.release_tag }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: calen-windows-x64
          path: release-artifacts

      - name: Publish assets and Windows-only updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
          PACKYCODE_API_KEY: ${{ secrets.PACKYCODE_API_KEY }}
          AI_RELEASE_NOTES_API_KEY: ${{ secrets.AI_RELEASE_NOTES_API_KEY }}
          AI_RELEASE_NOTES_BASE_URL: ${{ vars.AI_RELEASE_NOTES_BASE_URL }}
          AI_RELEASE_NOTES_MODEL: ${{ vars.AI_RELEASE_NOTES_MODEL }}
        run: |
          set -euo pipefail
          github_notes_path="$RUNNER_TEMP/calen-github-release-notes.md"
          notes_path="$RUNNER_TEMP/calen-release-notes.md"
          if ! gh api "repos/$GH_REPO/releases/generate-notes" -f tag_name="$RELEASE_TAG" --jq ".body" > "$github_notes_path"; then
            printf 'Calen %s\n' "$RELEASE_TAG" > "$github_notes_path"
          fi
          node scripts/release/create-ai-release-notes.mjs "$RELEASE_TAG" "$notes_path" "$github_notes_path"
          test -s "$notes_path" || printf 'Calen %s\n' "$RELEASE_TAG" > "$notes_path"

          node scripts/release/create-tauri-updater-manifest.mjs release-artifacts release-artifacts/latest.json "$notes_path"
          node -e 'const m=require("./release-artifacts/latest.json"); if(Object.keys(m.platforms).some(k=>!k.startsWith("windows-"))) process.exit(1)'

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --draft --title "Calen $RELEASE_TAG" --notes-file "$notes_path"
            while IFS= read -r asset; do
              [ -z "$asset" ] || gh release delete-asset "$RELEASE_TAG" "$asset" --yes
            done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
          else
            gh release create "$RELEASE_TAG" --verify-tag --draft --title "Calen $RELEASE_TAG" --notes-file "$notes_path"
          fi

          gh release upload "$RELEASE_TAG" \
            release-artifacts/Calen-*-Windows-x64-Setup.exe \
            release-artifacts/Calen-*-Windows-x64-Setup.exe.sig \
            release-artifacts/Calen-*-Windows-x64.msi \
            release-artifacts/Calen-*-Windows-x64.msi.sig \
            release-artifacts/latest.json \
            --clobber

          publish_args=(--draft=false --title "Calen $RELEASE_TAG" --notes-file "$notes_path")
          if [ "$LIVEAGENT_IS_PRERELEASE" = true ]; then
            publish_args+=(--prerelease)
          else
            publish_args+=(--prerelease=false --latest)
          fi
          gh release edit "$RELEASE_TAG" "${publish_args[@]}"
